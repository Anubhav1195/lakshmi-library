<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>लक्ष्मी डिजिटल लाइब्रेरी</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
        p {
            color: #555;
            margin: 10px 0;
        }
        .library-image {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .fee-section {
            margin-top: 30px;
        }
        .fee-section input {
            width: 100px;
            padding: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Laxmi Digital Library</h1>
        <img class="library-image" src="library1.jpg.jpeg" alt="लाइब्रेरी फोटो">
        <p><strong>Address:</strong>New Bypass Gola</p>
        <p><strong>Contact:</strong> 638787459</p>
        <div class="fee-section">
            <h2>Fees</h2>
            <label>Fees/Month: ₹</label>
            <input type="number" placeholder="राशि दर्ज करें">
        </div>
    </div>
</body>
</html>
