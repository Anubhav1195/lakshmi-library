<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>लक्ष्मी डिजिटल लाइब्रेरी</title>
    <style>
        .slider {
    position: relative;
    width: 100%;
    max-width: 800px;
    height: 300px;
    margin: 20px auto;
    overflow: hidden;
    border-radius: 15px;
}

.slide {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1s ease-in-out;
}

.slide.active {
    opacity: 1;
}
        body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #dfe9f3, #ffffff);
    margin: 0;
    padding: 0;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.1);
    text-align: center;
}

.whatsapp-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 25px;
    background-color: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
}

.whatsapp-btn:hover {
    opacity: 0.9;
}
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 0;

        }
        .container {
            max-width: 800px;
            margin: 50px auto;

        h1 {

        }

            width: 100%;

            border-radius: 8px;
            margin-bottom: 20px;
        }
        .fee-section {
            margin-top: 30px;
        }
        .fee-section input {
            width: 100px;
            padding: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Laxmi Digital Library</h1>
     <div class="slider">
    <img src="library1.jpeg" class="slide active" alt="Library Photo 1">
    <img src="library2.jpeg" class="slide" alt="Library Photo 2">
    <img src="library3.jpeg" class="slide" alt="Library Photo 3">
</div>

           <a href="https://wa.me/916387837459" target="_blank" class="whatsapp-btn">
        Contact
    </a>
        <div class="fee-section">
            <h2>Fees</h2>
            <label>Fees/Month: ₹</label>
            <input type="number" placeholder="राशि दर्ज करें">
        </div>
    </div>
    <script>
    let slides = document.querySelectorAll(".slide");
    let index = 0;

    function showSlides() {
        slides.forEach((slide) => {
            slide.classList.remove("active");
        });

        index++;
        if (index > slides.length) {
            index = 1;
        }

        slides[index - 1].classList.add("active");
    }

    showSlides();
    setInterval(showSlides, 3000);
</script>
</body>
